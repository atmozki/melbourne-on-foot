name: Nightly data refresh

on:
  schedule:
    # 17:30 UTC is 3:30am in Melbourne, after the previous day's counts land
    - cron: "30 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r pipeline/requirements.txt

      - name: Run pipeline
        run: python run_pipeline.py

      - name: Commit refreshed marts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/marts
          if git diff --cached --quiet; then
            echo "Marts unchanged, nothing to commit"
          else
            git commit -m "Data refresh $(date -u +%Y-%m-%d)"
            git push
          fi
